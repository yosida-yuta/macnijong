<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>パスワード再設定 - Macni雀</title>
</head>
<body>
<h1>パスワード再設定</h1>

{% if sent %}
  <p>📧 メールを送信しました（登録済みなら届きます）。<br>
  30分以内にリンクを開いて再設定してください。</p>
{% else %}
  {% if error %}<p style="color:red;">{{ error }}</p>{% endif %}
  <form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>登録メールアドレス</label><br>
    <input type="email" name="email" required
           placeholder="you@macnica.co.jp / you@pn.macnica.co.jp"><br><br>
    <button type="submit">再設定メールを送信</button>
  </form>
{% endif %}

<p><a href="/login">← ログインに戻る</a></p>
</body>
</html>
