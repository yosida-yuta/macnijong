{% extends "base.html" %}
{% block title %}パスワード再設定 - Macni雀{% endblock %}

{% block content %}
<div class="container">
    <h1>パスワード再設定</h1>
    <h2>登録済みメールアドレスを入力</h2>

    {% if sent %}
        <p class="success">
            📧 メールを送信しました。<br>
            30分以内にリンクを開いて再設定してください。
        </p>
    {% else %}
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('password_reset') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label>登録メールアドレス</label>
            <input type="email" name="email" required
                   placeholder="you@macnica.co.jp / you@pn.macnica.co.jp">

            <button type="submit" class="btn-primary" style="width:100%;">再設定メールを送信</button>
        </form>
    {% endif %}

    <a href="/login" class="link">← ログインに戻る</a>
</div>
{% endblock %}
