{% extends "base.html" %}
{% block title %}アカウント登録 - Macni雀{% endblock %}

{% block content %}
<div class="container">
    <h1>アカウント登録</h1>
    <h2>社員メールアドレスで認証</h2>

    {% if sent %}
        <p class="success">
            📧 認証メールを送信しました。<br>
            メール内のリンクから登録を完了してください（15分以内）。
        </p>
    {% else %}
        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST" action="{{ url_for('register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

            <label>社員メールアドレス</label>
            <input type="email" name="email" required
                   placeholder="you@macnica.co.jp / you@pn.macnica.co.jp">

            <button type="submit" class="btn-primary" style="width:100%;">認証メールを送信</button>
        </form>

        <p style="text-align:center; font-size:12px; color: var(--text-mute); margin-top:10px;">
            ※ 認証メール内のリンクは 15分で無効になります。
        </p>
    {% endif %}

    <a href="/login" class="link">← ログインに戻る</a>
</div>
{% endblock %}
