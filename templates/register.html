<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Macni雀 - アカウント新規作成</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="container">
    <h1>Macni雀</h1>
    <h2>アカウント新規作成</h2>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" id="registerForm">
      <label>ニックネーム</label>
      <input type="text" name="nickname" required maxlength="20">

      <label>社員番号</label>
      <input type="text" name="employee_number" required>

      <label>パスワード</label>
      <input type="password" name="password" id="pw1" required minlength="6">

      <label>パスワード再入力</label>
      <input type="password" id="pw2" required minlength="6">

      <p id="pw-error" class="error" style="display:none;">パスワードが一致しません</p>

      <button type="submit">登録</button>
    </form>

    <a href="/login" class="link">ログインページに戻る</a>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      var pw1 = document.getElementById('pw1').value;
      var pw2 = document.getElementById('pw2').value;

      if (pw1 !== pw2) {
        e.preventDefault();
        document.getElementById('pw-error').style.display = 'block';
        return;
      }

      if (!confirm('この内容で登録しますか？')) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
