<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macni雀 - プロフィール</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
    .profile-wrap {
        max-width: 700px;
        margin: 30px auto;
        padding: 0 16px;
        color: #fff;
    }

    .profile-card {
        background: #fff;
        color: #000;
        border-radius: 12px;
        padding: 20px;
        margin: 16px 0;
        border: 1px solid rgba(0,0,0,0.1);
    }

    .profile-avatar {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 16px;
    }

    .profile-avatar-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: #2e7d32;
        color: #fff;
        font-size: 28px;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .profile-name {
        font-size: 22px;
        font-weight: bold;
    }

    .profile-sub {
        color: #666;
        font-size: 14px;
    }

    .input-row {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin: 12px 0;
    }

    .input-row label {
        font-weight: bold;
    }

    .input-row input,
    .input-row textarea {
        padding: 8px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        width: 100%;
        box-sizing: border-box;
    }

    .btn-primary {
        background: #2e7d32;
        color: #fff;
        border: none;
        padding: 10px 18px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 15px;
    }

    .btn-primary:hover {
        background: #1b5e20;
    }

    .back-link {
        color: #fff;
        text-decoration: none;
        padding: 4px 8px;
    }

    .back-link:hover {
        text-decoration: underline;
    }
    </style>
</head>
<body>

<div class="container">

    <div class="header">
        /menu
        <span class="nickname">{{ nickname }}</span>
    </div>

    <div class="profile-wrap">
        <h1 style="text-align:center;">👤 プロフィール</h1>

        <div class="profile-card">

            <div class="profile-avatar">
                <div class="profile-avatar-icon">
                    {{ user.nickname[0] if user.nickname else "?" }}
                </div>
                <div>
                    <div class="profile-name">{{ user.nickname }}</div>
                    <div class="profile-sub">社員番号: {{ user.employee_number }}</div>
                    <div class="profile-sub">登録日: {{ user.created_at.strftime('%Y-%m-%d') }}</div>
                </div>
            </div>

            {{ url_for('profile') }}

                <div class="input-row">
                    <label>ニックネーム</label>
                    <input type="text" name="nickname" value="{{ user.nickname }}" required>
                </div>

                <div class="input-row">
                    <label>自己紹介 (160文字まで)</label>
                    <textarea name="bio" maxlength="160" rows="3"
                        placeholder="麻雀好き / 雀荘で月1で遊ぶ / リーチ派…">{{ user.bio or "" }}</textarea>
                </div>

                <button type="submit" class="btn-primary">保存する</button>
            </form>

        </div>
    </div>
</div>

</body>
</html>
