<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macni雀 - メニュー</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="/logout" class="logout-link">ログアウト</a>
            <div class="header">
            <a href="/profile" class="nickname-link">{{ nickname }}</a>
            </div>
        </div>


        <h1>Macni</h1>

        <div class="menu-grid">
            <a href="{{ url_for('score') }}" class="menu-btn">🀄 点数計算</a>
            <a href="{{ url_for('score_manage') }}" class="menu-btn">📊 点数管理</a>
            <a href="{{ url_for('groups') }}" class="menu-btn">👥 グループ</a>
            <a href="{{ url_for('matching') }}" class="menu-btn">🤝 マッチング</a>
        </div>
        {% if is_admin %}
        <div style="margin-top: 20px; text-align: center;">
            <a href="/admin/audit"
            style="
                    display:inline-block;
                    padding:14px 22px;
                    background:#C03A22;
                    color:#fff;
                    border-radius:10px;
                    font-weight:bold;
                    text-decoration:none;
                    box-shadow:0 2px 6px rgba(0,0,0,0.15);
                ">
                🛠 管理者ページ（監査ログ）
            </a>
        </div>
        {% endif %}
    </div>
</body>
</html>
