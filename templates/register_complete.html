<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アカウント登録 - Macni雀</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<header class="header">
  <a href="{{ url_for('login') }}" class="back-link">← ログイン</a>
  <h1 class="app-title">Macni雀</h1>
</header>

<main class="main-container">
  <h2 class="page-title">アカウント登録</h2>

  <p style="margin-bottom:14px;">
    メールアドレス：<strong>{{ email }}</strong>
  </p>

  {% if error %}
    <div style="padding:12px; background:#ffebee; color:#c62828; border-radius:6px; margin-bottom:12px;">
      {{ error }}
    </div>
  {% endif %}

  <form method="POST" action="{{ url_for('register_verify') }}" style="display:flex; flex-direction:column; gap:12px;">
    <input type="hidden" name="token" value="{{ token }}">

    <label>ニックネーム</label>
    <input type="text" name="nickname" required style="padding:10px; font-size:16px;">

    <label>社員番号</label>
    <input type="text" name="employee_number" required style="padding:10px; font-size:16px;">

    <label>パスワード（8文字以上）</label>
    <input type="password" name="password" required minlength="8" style="padding:10px; font-size:16px;">

    <button type="submit" class="btn-primary" style="padding:12px;">登録完了</button>
  </form>
</main>
</body>
</html>
