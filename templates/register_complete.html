{% extends "base.html" %}
{% block title %}本登録 - Macni雀{% endblock %}

{% block content %}
<div class="container">
    <h1>アカウント登録</h1>
    <h2>プロフィールを設定してください</h2>

    <p style="text-align:center; margin-bottom:14px; color: var(--text-dim);">
        📧 <strong>{{ email }}</strong>
    </p>

    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST" action="{{ url_for('register_verify') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="token" value="{{ token }}">

        <label>ニックネーム</label>
        <input type="text" name="nickname" required>

        <label>社員番号</label>
        <input type="text" name="employee_number" required>

        <label>パスワード（8文字以上）</label>
        <input type="password" name="password" required minlength="8">

        <button type="submit" class="btn-primary" style="width:100%;">登録完了</button>
    </form>

    <a href="/login" class="link">← ログインに戻る</a>
</div>
{% endblock %}
