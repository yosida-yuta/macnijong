<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>新しいパスワード設定 - Macni雀</title>
</head>
<body>
<h1>新しいパスワードを設定</h1>

{% if error %}<p style="color:red;">{{ error }}</p>{% endif %}

<form method="POST">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="token" value="{{ token }}">

    <label>新しいパスワード（8文字以上）</label><br>
    <input type="password" name="password" required minlength="8"><br><br>

    <label>もう一度入力</label><br>
    <input type="password" name="password2" required minlength="8"><br><br>

    <button type="submit">更新する</button>
</form>
</body>
</html>
